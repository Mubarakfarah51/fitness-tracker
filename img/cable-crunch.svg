<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Cable machine -->
  <rect x="195" y="10" width="10" height="60" rx="2" fill="#333"/>
  <rect x="180" y="5" width="40" height="10" rx="3" fill="#444"/>
  <!-- Cable -->
  <line x1="200" y1="40" x2="200" y2="75" stroke="#ff6b1a" stroke-width="2" opacity="0.3"/>
  <!-- Figure kneeling -->
  <ellipse cx="200" cy="90" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <!-- Torso crunching down -->
  <rect x="185" y="100" width="30" height="30" rx="6" fill="#ff6b1a" opacity="0.15" transform="rotate(20 200 115)"/>
  <!-- Knees on ground -->
  <rect x="175" y="135" width="20" height="12" rx="4" fill="#ff6b1a" opacity="0.2"/>
  <rect x="205" y="135" width="20" height="12" rx="4" fill="#ff6b1a" opacity="0.2"/>
  <!-- Hands behind head holding rope -->
  <line x1="195" y1="82" x2="200" y2="75" stroke="#ff6b1a" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="205" y1="82" x2="200" y2="75" stroke="#ff6b1a" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Rope attachment -->
  <circle cx="200" cy="73" r="4" fill="#ff6b1a" opacity="0.5"/>
  <!-- Ab highlight -->
  <ellipse cx="198" cy="112" rx="10" ry="14" fill="#ff6b1a" opacity="0.12"/>
  <!-- Motion arc -->
  <path d="M220 85 Q230 100 220 120" stroke="#ff6b1a" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.3"/>
  <text x="200" y="175" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">CABLE CRUNCH</text>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Rectus Abdominis</text>
</svg>
