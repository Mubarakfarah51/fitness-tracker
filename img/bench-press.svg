<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Bench -->
  <rect x="100" y="140" width="200" height="12" rx="4" fill="#333"/>
  <rect x="130" y="152" width="8" height="30" rx="2" fill="#444"/>
  <rect x="262" y="152" width="8" height="30" rx="2" fill="#444"/>
  <!-- Person silhouette on bench -->
  <ellipse cx="200" cy="120" rx="14" ry="14" fill="#ff6b1a" opacity="0.3"/>
  <rect x="170" y="125" width="60" height="14" rx="4" fill="#ff6b1a" opacity="0.2"/>
  <!-- Barbell -->
  <rect x="80" y="88" width="240" height="6" rx="3" fill="#ff6b1a"/>
  <!-- Plates -->
  <rect x="70" y="78" width="16" height="26" rx="4" fill="#ff6b1a" opacity="0.6"/>
  <rect x="314" y="78" width="16" height="26" rx="4" fill="#ff6b1a" opacity="0.6"/>
  <!-- Arms -->
  <line x1="165" y1="125" x2="140" y2="94" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="235" y1="125" x2="260" y2="94" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="30" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">BENCH PRESS</text>
  <text x="200" y="48" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Chest · Shoulders · Triceps</text>
</svg>
