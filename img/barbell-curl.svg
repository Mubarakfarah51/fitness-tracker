<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Figure -->
  <ellipse cx="200" cy="45" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="185" y="57" width="30" height="55" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Arms curling -->
  <line x1="185" y1="70" x2="170" y2="95" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="215" y1="70" x2="230" y2="95" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Barbell -->
  <rect x="130" y="92" width="140" height="6" rx="3" fill="#ff6b1a"/>
  <rect x="118" y="84" width="16" height="22" rx="4" fill="#ff6b1a" opacity="0.6"/>
  <rect x="266" y="84" width="16" height="22" rx="4" fill="#ff6b1a" opacity="0.6"/>
  <!-- Bicep highlight -->
  <ellipse cx="175" cy="80" rx="6" ry="10" fill="#ff6b1a" opacity="0.15"/>
  <ellipse cx="225" cy="80" rx="6" ry="10" fill="#ff6b1a" opacity="0.15"/>
  <!-- Legs -->
  <rect x="183" y="112" width="14" height="40" rx="4" fill="#ff6b1a" opacity="0.1"/>
  <rect x="203" y="112" width="14" height="40" rx="4" fill="#ff6b1a" opacity="0.1"/>
  <text x="200" y="175" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">BARBELL CURL</text>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Biceps</text>
</svg>
