<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Machine frame -->
  <rect x="250" y="30" width="8" height="140" rx="2" fill="#333"/>
  <rect x="240" y="25" width="28" height="10" rx="3" fill="#444"/>
  <!-- Sled/platform -->
  <rect x="200" y="60" width="60" height="50" rx="6" fill="#333" transform="rotate(-35 230 85)"/>
  <!-- Figure reclined -->
  <ellipse cx="140" cy="100" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="140" y="100" width="40" height="22" rx="6" fill="#ff6b1a" opacity="0.15" transform="rotate(-20 160 111)"/>
  <!-- Seat -->
  <rect x="100" y="115" width="80" height="10" rx="4" fill="#333" transform="rotate(-15 140 120)"/>
  <!-- Legs pressing -->
  <line x1="170" y1="105" x2="210" y2="80" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="175" y1="110" x2="215" y2="90" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Feet on platform -->
  <rect x="208" y="73" width="14" height="8" rx="3" fill="#ff6b1a" opacity="0.5"/>
  <rect x="213" y="85" width="14" height="8" rx="3" fill="#ff6b1a" opacity="0.5"/>
  <!-- Quad highlight -->
  <ellipse cx="190" cy="92" rx="10" ry="8" fill="#ff6b1a" opacity="0.12"/>
  <text x="200" y="175" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">LEG PRESS</text>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Quads · Glutes</text>
</svg>
