<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Squat rack -->
  <rect x="120" y="20" width="8" height="150" rx="2" fill="#333"/>
  <rect x="272" y="20" width="8" height="150" rx="2" fill="#333"/>
  <rect x="112" y="55" width="24" height="6" rx="2" fill="#444"/>
  <rect x="264" y="55" width="24" height="6" rx="2" fill="#444"/>
  <!-- Barbell on shoulders -->
  <rect x="135" y="62" width="130" height="6" rx="3" fill="#ff6b1a"/>
  <rect x="125" y="56" width="14" height="18" rx="3" fill="#ff6b1a" opacity="0.6"/>
  <rect x="261" y="56" width="14" height="18" rx="3" fill="#ff6b1a" opacity="0.6"/>
  <!-- Figure squatting -->
  <ellipse cx="200" cy="52" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="185" y="68" width="30" height="40" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Legs bent -->
  <line x1="190" y1="108" x2="178" y2="135" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="210" y1="108" x2="222" y2="135" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="178" y1="135" x2="172" y2="165" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="222" y1="135" x2="228" y2="165" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- Quad highlight -->
  <ellipse cx="182" cy="125" rx="8" ry="14" fill="#ff6b1a" opacity="0.12"/>
  <ellipse cx="218" cy="125" rx="8" ry="14" fill="#ff6b1a" opacity="0.12"/>
  <text x="200" y="190" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">BARBELL SQUAT</text>
</svg>
