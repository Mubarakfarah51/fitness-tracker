<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Figure in lunge position -->
  <ellipse cx="200" cy="35" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="185" y="47" width="30" height="45" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Front leg bent -->
  <line x1="195" y1="92" x2="170" y2="125" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="170" y1="125" x2="165" y2="160" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Back leg extended -->
  <line x1="210" y1="92" x2="245" y2="120" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="245" y1="120" x2="260" y2="155" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- Feet -->
  <rect x="155" y="158" width="18" height="6" rx="3" fill="#ff6b1a" opacity="0.4"/>
  <rect x="256" y="153" width="12" height="6" rx="3" fill="#ff6b1a" opacity="0.3"/>
  <!-- Quad/glute highlight -->
  <ellipse cx="180" cy="115" rx="9" ry="14" fill="#ff6b1a" opacity="0.12"/>
  <!-- Motion arrows -->
  <path d="M140 80 L160 80" stroke="#ff6b1a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.3"/>
  <polygon points="160,77 166,80 160,83" fill="#ff6b1a" opacity="0.3"/>
  <text x="200" y="185" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">WALKING LUNGES</text>
</svg>
