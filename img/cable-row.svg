<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Machine -->
  <rect x="80" y="60" width="10" height="80" rx="2" fill="#333"/>
  <rect x="75" y="55" width="20" height="10" rx="3" fill="#444"/>
  <!-- Cable -->
  <line x1="85" y1="95" x2="175" y2="100" stroke="#ff6b1a" stroke-width="2" opacity="0.4"/>
  <!-- Figure seated -->
  <ellipse cx="220" cy="75" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="205" y="87" width="30" height="45" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <rect x="200" y="132" width="40" height="12" rx="4" fill="#ff6b1a" opacity="0.1"/>
  <!-- Foot plate -->
  <rect x="155" y="125" width="8" height="30" rx="2" fill="#444"/>
  <!-- Arms pulling -->
  <line x1="205" y1="95" x2="175" y2="100" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Handle -->
  <rect x="170" y="94" width="10" height="12" rx="3" fill="#ff6b1a" opacity="0.6"/>
  <!-- Back highlight -->
  <ellipse cx="215" cy="100" rx="12" ry="18" fill="#ff6b1a" opacity="0.1"/>
  <text x="200" y="180" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">SEATED CABLE ROW</text>
  <text x="200" y="195" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Mid Back · Rhomboids</text>
</svg>
