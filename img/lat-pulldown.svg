<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Machine frame -->
  <rect x="195" y="10" width="10" height="50" rx="2" fill="#333"/>
  <rect x="140" y="10" width="120" height="8" rx="3" fill="#444"/>
  <!-- Bar -->
  <rect x="130" y="55" width="140" height="6" rx="3" fill="#ff6b1a"/>
  <rect x="120" y="50" width="14" height="16" rx="3" fill="#ff6b1a" opacity="0.5"/>
  <rect x="266" y="50" width="14" height="16" rx="3" fill="#ff6b1a" opacity="0.5"/>
  <!-- Figure seated -->
  <ellipse cx="200" cy="85" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="185" y="97" width="30" height="45" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <rect x="180" y="142" width="16" height="30" rx="4" fill="#ff6b1a" opacity="0.1"/>
  <rect x="204" y="142" width="16" height="30" rx="4" fill="#ff6b1a" opacity="0.1"/>
  <!-- Arms pulling -->
  <line x1="185" y1="100" x2="145" y2="61" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="215" y1="100" x2="255" y2="61" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Lat highlight -->
  <ellipse cx="178" cy="105" rx="8" ry="16" fill="#ff6b1a" opacity="0.12"/>
  <ellipse cx="222" cy="105" rx="8" ry="16" fill="#ff6b1a" opacity="0.12"/>
  <text x="200" y="192" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">LAT PULLDOWN</text>
</svg>
