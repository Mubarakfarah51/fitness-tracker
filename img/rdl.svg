<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Figure hinged -->
  <ellipse cx="170" cy="60" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="170" y="68" width="60" height="20" rx="6" fill="#ff6b1a" opacity="0.15" transform="rotate(25 200 78)"/>
  <!-- Legs straight -->
  <line x1="230" y1="90" x2="225" y2="140" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="240" y1="90" x2="235" y2="140" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- Arms hanging -->
  <line x1="175" y1="72" x2="168" y2="105" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Barbell -->
  <rect x="130" y="102" width="80" height="6" rx="3" fill="#ff6b1a"/>
  <rect x="120" y="96" width="14" height="18" rx="3" fill="#ff6b1a" opacity="0.6"/>
  <rect x="206" y="96" width="14" height="18" rx="3" fill="#ff6b1a" opacity="0.6"/>
  <!-- Hamstring highlight -->
  <ellipse cx="228" cy="115" rx="7" ry="16" fill="#ff6b1a" opacity="0.15"/>
  <ellipse cx="238" cy="115" rx="7" ry="16" fill="#ff6b1a" opacity="0.15"/>
  <text x="200" y="175" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">ROMANIAN DEADLIFT</text>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Hamstrings · Glutes</text>
</svg>
