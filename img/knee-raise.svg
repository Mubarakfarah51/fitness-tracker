<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Pull-up bar -->
  <rect x="130" y="20" width="140" height="8" rx="4" fill="#444"/>
  <rect x="140" y="10" width="8" height="18" rx="2" fill="#333"/>
  <rect x="252" y="10" width="8" height="18" rx="2" fill="#333"/>
  <!-- Arms hanging -->
  <line x1="175" y1="28" x2="185" y2="55" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="225" y1="28" x2="215" y2="55" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Head -->
  <ellipse cx="200" cy="55" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <!-- Torso hanging -->
  <rect x="185" y="67" width="30" height="45" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Legs raised -->
  <line x1="192" y1="112" x2="180" y2="130" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="208" y1="112" x2="220" y2="130" stroke="#ff6b1a" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Knees bent up -->
  <line x1="180" y1="130" x2="185" y2="115" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="220" y1="130" x2="215" y2="115" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <!-- Ab highlight -->
  <ellipse cx="200" cy="100" rx="10" ry="16" fill="#ff6b1a" opacity="0.12"/>
  <!-- Motion arc -->
  <path d="M165 155 Q170 130 175 115" stroke="#ff6b1a" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.3"/>
  <text x="200" y="170" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">HANGING KNEE RAISE</text>
  <text x="200" y="187" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Lower Abs · Hip Flexors</text>
</svg>
