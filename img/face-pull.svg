<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Cable machine -->
  <rect x="95" y="20" width="10" height="120" rx="2" fill="#333"/>
  <rect x="85" y="15" width="30" height="10" rx="3" fill="#444"/>
  <!-- Cable -->
  <line x1="100" y1="60" x2="170" y2="80" stroke="#ff6b1a" stroke-width="2" opacity="0.3"/>
  <!-- Figure standing -->
  <ellipse cx="230" cy="55" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="215" y="67" width="30" height="55" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Arms pulling to face -->
  <line x1="215" y1="78" x2="175" y2="72" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="215" y1="85" x2="175" y2="85" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Rope ends -->
  <circle cx="170" cy="72" r="4" fill="#ff6b1a" opacity="0.6"/>
  <circle cx="170" cy="85" r="4" fill="#ff6b1a" opacity="0.6"/>
  <!-- Rear delt highlight -->
  <ellipse cx="240" cy="75" rx="8" ry="8" fill="#ff6b1a" opacity="0.12"/>
  <text x="230" y="160" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">FACE PULLS</text>
  <text x="230" y="177" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Rear Delts · Upper Back</text>
</svg>
