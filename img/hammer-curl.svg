  <rect x="185" y="52" width="30" height="55" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Arms curling hammer grip -->
  <line x1="185" y1="65" x2="168" y2="90" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="215" y1="65" x2="232" y2="90" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Dumbbells vertical (hammer grip) -->
  <rect x="163" y="85" width="8" height="24" rx="3" fill="#ff6b1a"/>
  <rect x="160" y="82" width="14" height="8" rx="2" fill="#ff6b1a" opacity="0.6"/>
  <rect x="160" y="102" width="14" height="8" rx="2" fill="#ff6b1a" opacity="0.6"/>
  <rect x="229" y="85" width="8" height="24" rx="3" fill="#ff6b1a"/>
  <rect x="226" y="82" width="14" height="8" rx="2" fill="#ff6b1a" opacity="0.6"/>
  <rect x="226" y="102" width="14" height="8" rx="2" fill="#ff6b1a" opacity="0.6"/>
  <!-- Brachioradialis highlight -->
  <ellipse cx="174" cy="80" rx="5" ry="12" fill="#ff6b1a" opacity="0.12"/>
  <ellipse cx="226" cy="80" rx="5" ry="12" fill="#ff6b1a" opacity="0.12"/>
  <text x="200" y="155" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">HAMMER CURLS</text>
  <text x="200" y="172" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Biceps · Brachioradialis</text>
