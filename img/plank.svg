<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Figure in plank -->
  <ellipse cx="120" cy="95" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <!-- Body straight line -->
  <rect x="130" y="95" width="160" height="16" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Arms -->
  <line x1="140" y1="100" x2="135" y2="130" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="155" y1="100" x2="150" y2="130" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- Forearms on ground -->
  <rect x="125" y="128" width="35" height="6" rx="3" fill="#ff6b1a" opacity="0.3"/>
  <!-- Toes -->
  <rect x="285" y="110" width="12" height="20" rx="3" fill="#ff6b1a" opacity="0.3"/>
  <!-- Core highlight -->
  <ellipse cx="210" cy="103" rx="30" ry="8" fill="#ff6b1a" opacity="0.1"/>
  <!-- Timer icon -->
  <circle cx="320" cy="60" r="20" stroke="#ff6b1a" stroke-width="2" fill="none" opacity="0.3"/>
  <line x1="320" y1="60" x2="320" y2="48" stroke="#ff6b1a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="320" y1="60" x2="328" y2="64" stroke="#ff6b1a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <text x="200" y="170" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">PLANK</text>
  <text x="200" y="187" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Core · Full Body Stability</text>
</svg>
