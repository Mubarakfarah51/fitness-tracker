<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <ellipse cx="200" cy="55" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="185" y="67" width="30" height="55" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Arms out to sides -->
  <line x1="185" y1="78" x2="120" y2="75" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="215" y1="78" x2="280" y2="75" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Dumbbells at sides -->
  <rect x="105" y="70" width="20" height="8" rx="4" fill="#ff6b1a"/>
  <rect x="275" y="70" width="20" height="8" rx="4" fill="#ff6b1a"/>
  <!-- Delt highlights -->
  <ellipse cx="175" cy="75" rx="10" ry="6" fill="#ff6b1a" opacity="0.15"/>
  <ellipse cx="225" cy="75" rx="10" ry="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Motion arcs -->
  <path d="M120 120 Q120 75 160 72" stroke="#ff6b1a" stroke-width="1" stroke-dasharray="4 3" fill="none" opacity="0.3"/>
  <path d="M280 120 Q280 75 240 72" stroke="#ff6b1a" stroke-width="1" stroke-dasharray="4 3" fill="none" opacity="0.3"/>
  <text x="200" y="160" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">LATERAL RAISES</text>
  <text x="200" y="177" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Side Delts</text>
</svg>
