<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#1a1a1a"/>
  <!-- Cable towers -->
  <rect x="60" y="15" width="10" height="130" rx="2" fill="#333"/>
  <rect x="330" y="15" width="10" height="130" rx="2" fill="#333"/>
  <!-- Figure -->
  <ellipse cx="200" cy="55" rx="12" ry="12" fill="#ff6b1a" opacity="0.3"/>
  <rect x="185" y="67" width="30" height="55" rx="6" fill="#ff6b1a" opacity="0.15"/>
  <!-- Arms/cables -->
  <line x1="65" y1="30" x2="185" y2="90" stroke="#ff6b1a" stroke-width="2" opacity="0.4"/>
  <line x1="335" y1="30" x2="215" y2="90" stroke="#ff6b1a" stroke-width="2" opacity="0.4"/>
  <line x1="185" y1="80" x2="185" y2="95" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="215" y1="80" x2="215" y2="95" stroke="#ff6b1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Chest highlight -->
  <ellipse cx="200" cy="82" rx="16" ry="10" fill="#ff6b1a" opacity="0.12"/>
  <text x="200" y="170" text-anchor="middle" fill="#ff6b1a" font-family="sans-serif" font-size="14" font-weight="bold">CABLE CHEST FLY</text>
  <text x="200" y="187" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Inner Chest · Pecs</text>
</svg>
